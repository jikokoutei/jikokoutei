name: Update Latest Repo in README

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — edit if you want a different time
  push:
    branches: [main]
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest pushed repo and update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Most recently pushed-to public repo, excluding forks and this profile repo itself.
            const { data: repos } = await github.rest.repos.listForUser({
              username: context.repo.owner,
              sort: 'pushed',
              per_page: 10,
            });

            const latest = repos.find(r => !r.fork && r.name !== context.repo.repo);

            if (!latest) {
              console.log('No eligible repo found, skipping.');
              return;
            }

            const updated = new Date(latest.pushed_at).toLocaleDateString('en-IN', {
              year: 'numeric', month: 'short', day: 'numeric',
            });

            const block = [
              `**[${latest.name}](${latest.html_url})**${latest.language ? ` \`${latest.language}\`` : ''}`,
              latest.description ? `> ${latest.description}` : '> _No description yet_',
              `★ ${latest.stargazers_count} · pushed ${updated}`,
            ].join('\n');

            const path = 'README.md';
            let readme = fs.readFileSync(path, 'utf8');

            const start = '<!--LATEST_REPO_START-->';
            const end = '<!--LATEST_REPO_END-->';
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`);

            if (!pattern.test(readme)) {
              console.log('Marker comments not found in README.md, skipping.');
              return;
            }

            readme = readme.replace(pattern, `${start}\n${block}\n${end}`);
            fs.writeFileSync(path, readme);

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync latest repo in README [skip ci]"
          file_pattern: README.md
